name: Telegram Price Monitor

on:
  schedule:
    # Roda a cada 30 minutos (economiza minutos do free tier em repos privados)
    # Troque para "*/15 * * * *" se quiser a cada 15 min (repo público = ilimitado)
    - cron: "*/10 * * * *"

  # Permite rodar manualmente pela aba Actions no GitHub
  workflow_dispatch:

jobs:
  monitor:
    name: Verificar promoções
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Configurar Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install telethon

      - name: Executar monitor
        env:
          TELEGRAM_API_ID:       ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH:     ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          TELEGRAM_GROUPS:       ${{ secrets.TELEGRAM_GROUPS }}
          KEYWORDS:              ${{ secrets.KEYWORDS }}
          CALLMEBOT_PHONE:       ${{ secrets.CALLMEBOT_PHONE }}
          CALLMEBOT_APIKEY:      ${{ secrets.CALLMEBOT_APIKEY }}
          GIST_ID:               ${{ secrets.GIST_ID }}
          GH_PAT:                ${{ secrets.GH_PAT }}
        run: python monitor.py
